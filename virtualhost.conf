<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/e-presence/public

    <Directory /var/www/e-presence/public>
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>